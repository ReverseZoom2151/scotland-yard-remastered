name: build

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # The wrapper is committed but a git checkout does not preserve the exec bit
      # on every platform, so make sure it is there before we lean on it.
      - name: Make the Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Build and test
        run: ./mvnw -B clean test
